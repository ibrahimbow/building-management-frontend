services:

  bm-frontend:
    build:
      context: ../..
      dockerfile: deployment/production/Dockerfile.prod
    image: joritna-bm-frontend:latest
    container_name: joritna-frontend
    restart: unless-stopped

    expose:
      - "80"

    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - joritna-network


networks:
  joritna-network:
    external: true