<section class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Building Management</p>
    <h1>Welcome back</h1>
    <p class="subtitle">Login to continue to your dashboard.</p>

    <form #loginForm="ngForm" (ngSubmit)="login()" novalidate>
      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        required
        email
        placeholder="you@example.com"
      />

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        [(ngModel)]="password"
        required
        minlength="6"
        placeholder="Your password"
      />

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isSubmitting || loginForm.invalid">
        {{ isSubmitting ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <p class="switch-auth">
      New here?
      <a routerLink="/auth/register">Create an account</a>
    </p>
  </div>
</section>
