<section class="auth-page">
  <mat-card class="auth-card">
    <mat-card-title>Create account</mat-card-title>
    <mat-card-subtitle>Register as tenant or manager</mat-card-subtitle>

    <mat-card-content>
      <form (ngSubmit)="register()" #form="ngForm" novalidate>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput name="username" [(ngModel)]="username" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Display name</mat-label>
          <input matInput name="displayName" [(ngModel)]="displayName" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" name="email" [(ngModel)]="email" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Phone number</mat-label>
          <input
            matInput
            name="phoneNumber"
            [(ngModel)]="phoneNumber"
            placeholder="+32465570653"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" name="password" [(ngModel)]="password" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Account type</mat-label>
          <mat-select name="role" [(ngModel)]="role" required>
            <mat-option value="TENANT">Tenant</mat-option>
            <mat-option value="MANAGER">Manager</mat-option>
          </mat-select>
        </mat-form-field>

        <p class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </p>

        <button
          mat-raised-button
          color="primary"
          class="full-width"
          type="submit"
          [disabled]="isSubmitting">
          {{ isSubmitting ? 'Creating account...' : 'Create account' }}
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <a routerLink="/auth/login">Already have an account? Login</a>
    </mat-card-actions>
  </mat-card>
</section>
