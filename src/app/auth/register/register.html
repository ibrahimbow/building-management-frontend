<section class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Building Management</p>
    <h1>Create account</h1>
    <p class="subtitle">
      Register now. Later, tenants can join a building using an invitation code.
    </p>

    <form #registerForm="ngForm" (ngSubmit)="register()" novalidate>
      <label for="name">Full name</label>
      <input
        id="name"
        name="name"
        [(ngModel)]="name"
        required
        placeholder="Ibrahim"
      />

      <label for="nickname">Public nickname</label>
      <input
        id="nickname"
        name="nickname"
        [(ngModel)]="nickname"
        required
        placeholder="Ibrahim B."
      />

      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        required
        email
        placeholder="you@example.com"
      />

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        [(ngModel)]="password"
        required
        minlength="6"
        placeholder="At least 6 characters"
      />

      <label for="role">Role for local MVP testing</label>
      <select id="role" name="role" [(ngModel)]="role">
        <option value="TENANT">Tenant</option>
        <option value="MANAGER">Manager</option>
        <option value="ADMIN">Admin</option>
      </select>

      <p class="hint">
        Backend will decide real roles later. This dropdown is only for testing protected routes now.
      </p>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isSubmitting || registerForm.invalid">
        {{ isSubmitting ? 'Creating account...' : 'Register' }}
      </button>
    </form>

    <p class="switch-auth">
      Already have an account?
      <a routerLink="/auth/login">Login</a>
    </p>
  </div>
</section>
