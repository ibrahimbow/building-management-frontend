<section class="admin-dashboard">
  <div class="page-header">
    <div>
      <p class="eyebrow">Admin moderation</p>
      <h1>Admin Dashboard</h1>
      <p class="subtitle">
        Review and moderate platform content across announcements, Share & Help, and chat.
      </p>
    </div>
  </div>

  <div class="admin-grid">
    <button
      type="button"
      class="admin-card"
      (click)="goToAnnouncements()">

      <div class="icon">📢</div>
      <h2>Announcements</h2>
      <p>Review and delete inappropriate manager announcements.</p>
    </button>

    <button
      type="button"
      class="admin-card"
      (click)="goToShareAndHelp()">

      <div class="icon">🤝</div>
      <h2>Share & Help</h2>
      <p>Moderate tenant posts and comments.</p>
    </button>

    <button
      type="button"
      class="admin-card"
      (click)="goToChat()">

      <div class="icon">💬</div>
      <h2>Chat</h2>
      <p>Review and remove inappropriate chat messages.</p>
    </button>
  </div>
</section>
