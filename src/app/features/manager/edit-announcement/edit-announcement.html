<section class="edit-announcement-page">

  <div *ngIf="isLoading" class="loading-state">
    Loading announcement...
  </div>

  <mat-card *ngIf="!isLoading" class="form-card">

    <div class="form-header">
      <span class="page-label">Manager Dashboard</span>
      <h1>Edit Announcement</h1>
      <p>Update the announcement details and image for your tenants.</p>
    </div>

    <mat-card-content>
      <form #form="ngForm" (ngSubmit)="updateAnnouncement(form)" novalidate>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Title</mat-label>
          <input
            matInput
            name="title"
            [(ngModel)]="title"
            maxlength="255"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Message</mat-label>
          <textarea
            matInput
            name="message"
            [(ngModel)]="message"
            rows="4"
            maxlength="5000"
            required>
          </textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Category</mat-label>
          <mat-select
            name="category"
            [(ngModel)]="category"
            required>
            <mat-option
              *ngFor="let category of categories"
              [value]="category">
              {{ category }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <div class="upload-section">
          <label for="announcement-image">
            Image optional
          </label>

          <input
            id="announcement-image"
            type="file"
            accept="image/jpeg,image/png,image/webp"
            (change)="onImageSelected($event)"
            [disabled]="isSubmitting || isUploading"
          />

          <small>
            Allowed formats: JPG, PNG, WEBP. Maximum size: 5MB.
          </small>
        </div>

        <div class="preview-grid" *ngIf="hasValidImage(imageUrl)">
          <img
            [src]="resolveImageUrl(imageUrl)"
            alt="Selected announcement image preview"
          />

          <button
            mat-button
            color="warn"
            type="button"
            (click)="removeImage()"
            [disabled]="isSubmitting || isUploading">
            Remove image
          </button>
        </div>

        <div class="actions">
          <button
            mat-button
            type="button"
            routerLink="/manager/announcements">
            Cancel
          </button>

          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="isSubmitting || isUploading">
            {{ isSubmitting ? 'Saving...' : 'Save Changes' }}
          </button>
        </div>

      </form>
    </mat-card-content>

  </mat-card>

</section>
