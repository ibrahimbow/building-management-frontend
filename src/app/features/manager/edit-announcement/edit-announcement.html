<section class="edit-announcement-page">

  <p *ngIf="isLoading">
    Loading announcement...
  </p>

  <mat-card *ngIf="!isLoading" class="form-card">
    <mat-card-title>Edit Announcement</mat-card-title>
    <mat-card-subtitle>
      Update the announcement details for your tenants.
    </mat-card-subtitle>

    <mat-card-content>
      <form #form="ngForm" (ngSubmit)="updateAnnouncement(form)" novalidate>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Title</mat-label>
          <input
            matInput
            name="title"
            [(ngModel)]="title"
            maxlength="255"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Message</mat-label>
          <textarea
            matInput
            name="message"
            [(ngModel)]="message"
            rows="5"
            maxlength="5000"
            required>
          </textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Category</mat-label>
          <mat-select
            name="category"
            [(ngModel)]="category"
            required>
            <mat-option
              *ngFor="let category of categories"
              [value]="category">
              {{ category }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Image URL</mat-label>
          <input
            matInput
            name="imageUrl"
            [(ngModel)]="imageUrl"
            maxlength="500"
            placeholder="Optional image URL"
          />
        </mat-form-field>

        <div class="actions">
          <button
            mat-button
            type="button"
            routerLink="/manager/announcements">
            Cancel
          </button>

          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="isSubmitting">
            {{ isSubmitting ? 'Saving...' : 'Save Changes' }}
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>

</section>
