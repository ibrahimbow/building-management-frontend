<main class="content">
  <section class="cards">
    <mat-card 
  *ngFor="let item of menuItems" 
  class="dashboard-card"
  [class.disabled-card]="!userState.hasJoinedBuilding">

  <span
    *ngIf="item.notificationCount > 0"
    class="notification-badge">
    {{ item.notificationCount }}
  </span>

  <mat-card-header>
    <div mat-card-avatar class="card-icon">
      <mat-icon>{{ item.icon }}</mat-icon>
    </div>

    <mat-card-title>{{ item.title }}</mat-card-title>
    <mat-card-subtitle>{{ item.description }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-actions align="end">
    <button 
      mat-button 
      color="primary" 
      [routerLink]="userState.hasJoinedBuilding ? item.route : null"
      [disabled]="!userState.hasJoinedBuilding">
      <mat-icon>arrow_forward</mat-icon>
      Open
    </button>
  </mat-card-actions>

</mat-card>
  </section>

<mat-card 
  *ngIf="userState.hasJoinedBuilding"
  class="announcements">

  <mat-card-title>Latest Announcements</mat-card-title>

  <mat-list>
    <mat-list-item>
      <mat-icon matListItemIcon>water_drop</mat-icon>
      <div matListItemTitle>Water Maintenance</div>
      <div matListItemLine>Water supply maintenance on May 25, 2026</div>
    </mat-list-item>

    <mat-divider></mat-divider>

    <mat-list-item>
      <mat-icon matListItemIcon>elevator</mat-icon>
      <div matListItemTitle>Elevator Check</div>
      <div matListItemLine>Routine inspection scheduled next week</div>
    </mat-list-item>
  </mat-list>

</mat-card>
</main>
