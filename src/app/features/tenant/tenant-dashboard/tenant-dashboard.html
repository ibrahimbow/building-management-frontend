<main class="content">

  <mat-card
    *ngIf="!isLoading && !hasJoinedBuilding"
    class="join-building-card">

    <mat-card-title>Join a Building</mat-card-title>

    <mat-card-content>
      <p>You are not connected to a building yet. Join using the code provided by your manager.</p>

      <button
        mat-raised-button
        color="primary"
        routerLink="/tenant/join-building">
        Join Building
      </button>
    </mat-card-content>

  </mat-card>

  <section class="cards">

    <mat-card
      *ngFor="let item of menuItems"
      class="dashboard-card"
      [class.disabled-card]="!hasJoinedBuilding">

      <span
        *ngIf="hasJoinedBuilding && item.notificationCount > 0"
        class="notification-badge">
        {{ item.notificationCount }}
      </span>

      <mat-card-header>
        <div mat-card-avatar class="card-icon">
          <mat-icon>{{ item.icon }}</mat-icon>
        </div>

        <mat-card-title>{{ item.title }}</mat-card-title>
        <mat-card-subtitle>{{ item.description }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-actions align="end">
        <button
          mat-button
          color="primary"
          [routerLink]="hasJoinedBuilding ? item.route : null"
          [disabled]="!hasJoinedBuilding">
          <mat-icon>arrow_forward</mat-icon>
          Open
        </button>
      </mat-card-actions>

    </mat-card>

  </section>

  <mat-card
    *ngIf="hasJoinedBuilding"
    class="announcements">

    <mat-card-title>Latest Announcements</mat-card-title>

    <mat-list>
      <mat-list-item>
        <mat-icon matListItemIcon>campaign</mat-icon>
        <div matListItemTitle>Building announcements</div>
        <div matListItemLine>Open announcements to view the latest updates.</div>
      </mat-list-item>
    </mat-list>

  </mat-card>

</main>
