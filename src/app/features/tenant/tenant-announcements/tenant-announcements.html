<section class="tenant-announcements-page">

  <p *ngIf="isLoading">
    Loading announcements...
  </p>

  <mat-card
    *ngIf="!isLoading && announcements.length === 0"
    class="empty-card">

    <mat-card-title>No announcements yet</mat-card-title>

    <mat-card-content>
      <p>There are no announcements for your building yet.</p>
    </mat-card-content>

  </mat-card>

  <mat-card
    *ngFor="let announcement of announcements"
    class="announcement-card">

    <mat-card-header>
      <mat-icon mat-card-avatar>
        {{ announcement.icon || 'campaign' }}
      </mat-icon>

      <mat-card-title>
        {{ announcement.title }}
      </mat-card-title>

      <mat-card-subtitle>
        {{ announcement.createdAt | date:'mediumDate' }}
      </mat-card-subtitle>
    </mat-card-header>

    <div
      class="image-container"
      *ngIf="hasValidImage(announcement.imageUrl)">

      <img
        [src]="announcement.imageUrl"
        alt="announcement image" />
    </div>

    <mat-card-content>
      <p>{{ announcement.message }}</p>

      <div
        class="category-badge"
        [ngClass]="announcement.category.toLowerCase()">

        {{ announcement.category }}
      </div>
    </mat-card-content>

  </mat-card>

</section>
