<mat-card class="join-card">

  <h2>Join a Building</h2>
  <p>Enter the building code provided by your manager.</p>

  <form
    #form="ngForm"
    (ngSubmit)="joinBuilding(form)"
    novalidate>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Building code</mat-label>

      <input
        matInput
        name="buildingCode"
        placeholder="Example: BM-ABC123"
        required
        autocomplete="off"
        [disabled]="isSubmitting"
        [(ngModel)]="buildingCode" />

      <mat-error *ngIf="form.submitted && !buildingCode.trim()">
        Building code is required.
      </mat-error>
    </mat-form-field>

    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="isSubmitting || !buildingCode.trim()">

      {{ isSubmitting ? 'Joining...' : 'Join Building' }}

    </button>

  </form>

</mat-card>
