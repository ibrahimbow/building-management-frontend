<h2 mat-dialog-title>Confirm</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button type="button" (click)="cancel()">
    Cancel
  </button>

  <button mat-raised-button color="warn" type="button" (click)="confirm()">
    Delete
  </button>

</mat-dialog-actions>
