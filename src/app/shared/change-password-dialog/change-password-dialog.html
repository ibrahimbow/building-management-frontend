<div class="dialog-container">
  <h2 mat-dialog-title>Change Password</h2>

  <mat-dialog-content>
    <p class="dialog-description">
      Enter your current password and choose a new secure password.
    </p>

    <form class="password-form">
      <mat-form-field appearance="outline">
        <mat-label>Current password</mat-label>
        <input matInput type="password" [(ngModel)]="currentPassword" name="currentPassword" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>New password</mat-label>
        <input matInput type="password" [(ngModel)]="newPassword" name="newPassword" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Confirm new password</mat-label>
        <input matInput type="password" [(ngModel)]="confirmPassword" name="confirmPassword" />
      </mat-form-field>

      <p class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-raised-button color="primary" type="button" (click)="save()">
      Save Password
    </button>
  </mat-dialog-actions>
</div>
