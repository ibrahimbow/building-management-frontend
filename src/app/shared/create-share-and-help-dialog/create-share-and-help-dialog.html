<h2 mat-dialog-title>Create Post</h2>

<mat-dialog-content>
  <form class="post-form">

    <mat-form-field appearance="outline">
      <mat-label>Title</mat-label>
      <input
        matInput
        name="title"
        [(ngModel)]="title"
        placeholder="What do you want to share?"
        maxlength="120"
        [disabled]="isSubmitting"
      />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea
        matInput
        rows="4"
        name="description"
        [(ngModel)]="description"
        placeholder="Write your post details..."
        maxlength="2000"
        [disabled]="isSubmitting"
      ></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Image URL optional</mat-label>
      <input
        matInput
        name="imageUrl"
        [(ngModel)]="imageUrl"
        placeholder="https://example.com/image.jpg"
        [disabled]="isSubmitting"
      />
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button
    mat-button
    type="button"
    (click)="cancel()"
    [disabled]="isSubmitting"
  >
    Cancel
  </button>

  <button
    mat-raised-button
    color="primary"
    type="button"
    (click)="create()"
    [disabled]="
      isSubmitting ||
      !title.trim() ||
      !description.trim()
    "
  >
    {{ isSubmitting ? 'Posting...' : 'Post' }}
  </button>
</mat-dialog-actions>
