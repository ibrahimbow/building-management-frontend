<h2 mat-dialog-title>Create Share & Help Post</h2>

<mat-dialog-content>
  <form class="post-form" [formGroup]="form">

    <mat-form-field appearance="outline">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" placeholder="What do you want to share?" [readonly]="isSubmitting" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Description</mat-label>
      <textarea matInput rows="4" formControlName="description" placeholder="Write your post details..."
        [readonly]="isSubmitting">
      </textarea>
    </mat-form-field>

    <div class="upload-section">
      <label for="share-help-image">
        Image optional
      </label>

      <input id="share-help-image" type="file" accept="image/jpeg,image/png,image/webp"
        (change)="onImageSelected($event)" [disabled]="isSubmitting" />

      <small>
        Allowed formats: JPG, PNG, WEBP. Maximum size: 5MB.
      </small>
    </div>

    <div class="preview-grid" *ngIf="imagePreviewUrl as previewUrl">
      <img [src]="previewUrl" alt="Selected image preview" />

      <button mat-button color="warn" type="button" (click)="removeImage()" [disabled]="isSubmitting">
        Remove image
      </button>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button type="button" (click)="cancel()" [disabled]="isSubmitting">
    Cancel
  </button>

  <button mat-raised-button color="primary" type="button" (click)="create()" [disabled]="isSubmitting || form.invalid">
    {{ isSubmitting ? 'Posting...' : 'Post' }}
  </button>

</mat-dialog-actions>
